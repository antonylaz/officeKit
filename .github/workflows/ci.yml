name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: officekit
          POSTGRES_PASSWORD: officekit
          POSTGRES_DB: officekit
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U officekit"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql://officekit:officekit@localhost:5432/officekit?schema=public
      AUTH_SECRET: ci-test-secret-not-real-32-chars-abcdefg
      AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_dummy
      RESEND_FROM_EMAIL: ci@officekit.test
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma migrate deploy
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
