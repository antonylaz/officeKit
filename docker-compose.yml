services:
  postgres:
    image: postgres:16-alpine
    container_name: officekit-postgres
    environment:
      POSTGRES_USER: officekit
      POSTGRES_PASSWORD: officekit
      POSTGRES_DB: officekit
    ports:
      - "5432:5432"
    volumes:
      - officekit-pg:/var/lib/postgresql/data
volumes:
  officekit-pg:
